[exchange]
value = self().thru(data => \
  _.assign({}, \
    data, \
    _.chain([ \
      "fr_domainAllCodeLabel_fs", \
      "authIdHasPrimaryStructure_fs", \
      "collCategoryCodeName_fs", \
      "anrProjectTitle_s", \
      "europeanProjectTitle_s", \
      "funding_s", \
      "title_s", \
      "abstract_s", \
      "anses_funding_title_s", \
      "ademe_funding_title_s", \
      "irThesaurusName_s" \
    ]) \
      .map(field => [ \
        "Nettoyage" + field, \
        (_.get(data, field, "") || "").replace(/\\,/g, "#") \
      ]) \
      .fromPairs() \
      .value() \
  ) \
)
[assign]
path = ConcatDomaine0,1,2,3
value = fix([self.level0_domain_s,self.level1_domain_s,self.level2_domain_s,self.level3_domain_s]).flatMap(item =>_.uniq(_.compact(item.split(','))))

path = FinanceANREURO
value = fix([self.anrProjectReference_s,self.europeanProjectAcronym_s,self.anses_funding_acronym_s,self.ademe_funding_call_reference_s]).compact()

path = SubmitTypeGraph
value = get("submitType_s").castArray().map(type=>type==="file"?"Dont texte intégral":"").compact().push("Total")

path = AuteursAffillies
