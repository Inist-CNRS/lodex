# Reduce to distinct values form one or more fields
# Traduit le code langue 3 caractères en verbalisations fr (codes 639)


prepend = delegate?file=../worker.ini
mimeType = application/json
label = distinct

[use]
plugin = basics
plugin = lodex

[buildContext]
connectionStringURI = get('connectionStringURI')

[LodexReduceQuery]
reducer = distinct

[assign]
path = key
value = get('_id').toUpper()

[combine]
path = key
primer = publicationLanguage.json

[combine/FILELoad]
location = ./src/resources/

[combine/JSONParse]
separator = *

[combine/replace]
path = id
value =  get('alpha-3 code')
path = value
value = get('French name')

[replace]
path = _id
value = get('key.value')


path = value
value = get('value')

path = total
value = get('total')


[LodexOutput]
indent = true
extract = total
