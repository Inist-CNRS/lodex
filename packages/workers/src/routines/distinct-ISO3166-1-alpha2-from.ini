# Reduce to ditinct values form one or more fields

prepend = delegate?file=../worker.ini
mimeType = application/json
label = distinct

[use]
plugin = basics
plugin = lodex

[buildContext]
connectionStringURI = get('connectionStringURI')

[LodexReduceQuery]
reducer = distinct

[assign]
path = key
value = get('_id').toUpper()

[combine]
path = key
primer = publicationCountry.json

[combine/FILELoad]
location = ./src/resources/

[combine/JSONParse]
separator = *

[combine/replace]
path = id
value = get('English name')
path = value
value =  get('alpha-3 code')


[replace]
path = _id
value = get('key.value')

path = value
value = get('value')

path = total
value = get('total')


[LodexOutput]
indent = true
extract = total

