[use]
plugin  = basics

[env]
path = database_url
value = http://qdrant.lodex-net:6333


[unpack]
[ungroup]

[singleton]
merge = false
[singleton/replace]
path  = vectors.size
value = 384
path = vectors.distance
value = Cosine

[singleton/debug]
text = env('database_url').append('/collections/ma_collection').prepend('PUT ')
[singleton/URLConnect]
url = env('database_url').append('/collections/ma_collection')
method = PUT
json = true
streaming = true
encoder = pack
noerror = true
timeout = 30000
[singleton/debug]
text = resultat de creation de la collection

[debug]
text = env('fields')



[replace]
path = id
value = get('uri')

path = vector
value = get(`versions.0.${env('titleFieldName')}`).toString()

path = title
value = get(`versions.0.env('titleFieldName')}`).toString()

path = summary
value = get(`versions.0.env('summaryFieldName')}`).toString()

path = detail1
value = get(`versions.0.env('detail1FieldName')}`).toString()

path = detail2
value = get(`versions.0.env('detail2FieldName')}`).toString()

path = subtitle
value = get(`versions.0.env('subtitleFieldName')}`).toString()

path = date_published
value = get('publicationDate')

[debug]
text = document

[createVectorEmbeddings]
path = vector

[encode]
path = id
mode = uuid

[group]
size = 5

[replace]
path = points
value = self()

[spawn]
[spawn/debug]
text = env('database_url').append('/collections/ma_collection/points').prepend('PUT ')
[spawn/URLConnect]
url = env('database_url').append('/collections/ma_collection/points')
method = PUT
json = true
streaming = true
encoder = pack
noerror = true
timeout = 30000

[debug]
text = resulat indexation

[OBJCount]
value = true
